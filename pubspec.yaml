name: learningbubbles
description: A new Flutter project for Learning Bubbles.
publish_to: 'none'
version: 1.1.0+9

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^3.0.0
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.5.0
  firebase_auth: ^5.3.1
  firebase_analytics: ^11.0.0
  flutter_riverpod: ^2.5.1
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^1.0.8
  url_launcher: ^6.3.1
  shared_preferences: ^2.2.3
  audioplayers: ^6.0.0
  equatable: ^2.0.5
  share_plus: ^10.0.0
  purchases_flutter: ^8.0.0
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^5.0.0
  crypto: ^3.0.3
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/OP.png"

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/fonts/
    - assets/sfx/
    - assets/lottie/
